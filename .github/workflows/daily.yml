name: Daily CPG Intelligence Refresh

on:
  schedule:
    # Runs everyday at 06:00 UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual pipeline execution instantly

permissions:
  contents: write

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install feedparser

      - name: Run Extraction Pipeline
        run: |
          python collect_news.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff-index --quiet HEAD || git commit -m "Automated intelligence update: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
       
