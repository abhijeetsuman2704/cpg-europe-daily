name: CPG Europe Daily Intelligence

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Repository Files
        run: |
          echo "Repository contents:"
          ls -la

      - name: Run Newsletter Script
        run: |
          python collect_news.py
       
