name: Daily CPG Intelligence Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write      # Grants permission to deploy to GitHub Pages
  id-token: write

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install feedparser

      - name: Run Extraction Pipeline
        run: python collect_news.py

      - name: Commit and Push Archive to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff-index --quiet HEAD || git commit -m "Archive sync"
          git push

      - name: Upload Artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/' # Deploys the newly generated docs folder straight to the web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
